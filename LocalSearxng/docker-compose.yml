services:
  searxng:
    # Pinned for reproducible installs. Use Settings → Instances → "Check for image update" to pull deliberately.
    image: searxng/searxng:2025.2.12-d456f3dd9
    container_name: searxng
    ports:
      # Supports optional localhost-only bind via SEARXNG_HOST_BIND env (set by app at runtime)
      - "${SEARXNG_HOST_BIND:-}8080:8080"
    volumes:
      - ./searxng:/etc/searxng
      # Premium xAI/Grok/SpaceX-inspired Searxly theme (custom templates + static)
      - ./custom/templates:/etc/searxng/custom/templates
      - ./custom/static:/etc/searxng/custom/static
    restart: unless-stopped
    environment:
      # Force-disable the limiter/bot protection for local private use.
      # The image tends to override the setting in settings.yml via this env var.
      - SEARXNG_LIMITER=false
      # Ensure SearXNG listens on the published port from inside the container.
      # Without these, the default settings.yml (port 8888 + 127.0.0.1) makes the instance unreachable from the Mac host.
      - SEARXNG_PORT=8080
      - SEARXNG_BIND_ADDRESS=${SEARXNG_BIND_ADDRESS:-0.0.0.0}
    # Give the container a clear name in Docker Desktop
    labels:
      - "com.searxly.local=true"
    # Healthcheck lets Docker (and our manager) know when the Python app is actually serving requests.
    # This makes `docker compose up --wait` and status reporting much more accurate and feels faster.
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 15s   # More forgiving on low-RAM Macs where the Python process can be slow to initialize under memory pressure from Docker Desktop's VM.