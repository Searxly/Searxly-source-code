name: CI

# Runs the self-contained SPM known-answer suites (wallet crypto + security boundary). The full app
# target isn't built here — the entry point, ad-block, and VPN are private (see README).

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  knownanswer-tests:
    name: Known-answer tests (SPM)
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Swift toolchain
        run: swift --version

      - name: Cache SwiftPM
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            WalletCryptoTests/.build
            SecurityBoundaryTests/.build
          key: spm-${{ runner.os }}-${{ hashFiles('WalletCryptoTests/Package.swift', 'SecurityBoundaryTests/Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Wallet crypto known-answer tests
        run: bash scripts/run-wallet-crypto-tests.sh

      - name: Security-boundary tests
        run: bash scripts/run-security-boundary-tests.sh
